<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Familien-Finanzen | Buchungen</title>
    <meta name="theme-color" content="#0f8f67" />
    <link rel="manifest" href="./manifest.json" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Sora:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body class="antialiased">
    <div class="min-h-screen lg:flex">
      <aside class="hidden lg:flex lg:w-72 xl:w-80 p-5">
        <div class="card w-full p-5 flex flex-col gap-6">
          <header>
            <p class="text-xs uppercase tracking-[0.2em] text-slate-500">Familien-Kasse</p>
            <h1 class="font-display text-2xl font-semibold">Familien-Finanzplan</h1>
          </header>
          <nav class="space-y-2">
            <a class="sidebar-link" href="./dashboard.html">Überblick</a>
            <a class="sidebar-link" href="./accounts.html">Konten</a>
            <a class="sidebar-link active" href="./transactions.html">Buchungen</a>
            <a class="sidebar-link" href="./categories.html">Kategorien</a>
          </nav>
          <div class="mt-auto space-y-3">
            <p id="currentUserEmail" class="text-xs text-slate-500 break-all"></p>
            <button id="logoutBtn" class="btn btn-neutral w-full">Abmelden</button>
          </div>
        </div>
      </aside>

      <main class="flex-1 page-main p-4 lg:p-8 space-y-6">
        <header class="card p-5">
          <p class="text-sm text-slate-500">Schnell und einfach</p>
          <h2 class="font-display text-2xl font-semibold">Ausgabe, Einnahme oder Transfer buchen</h2>
        </header>

        <section class="grid grid-cols-1 xl:grid-cols-3 gap-4">
          <article class="card p-4 space-y-3">
            <h3 class="font-display text-lg font-semibold">+ Ausgabe</h3>
            <form id="expenseForm" class="space-y-2">
              <label class="space-y-1 block">
                <span class="text-sm font-semibold">Datum</span>
                <input id="expenseDate" type="date" class="form-input" required />
              </label>
              <label class="space-y-1 block">
                <span class="text-sm font-semibold">Betrag</span>
                <input id="expenseAmount" type="number" step="0.01" inputmode="decimal" class="form-input" required />
              </label>
              <label class="space-y-1 block">
                <span class="text-sm font-semibold">Kategorie</span>
                <select id="expenseCategory" class="form-select" required></select>
              </label>
              <label class="space-y-1 block">
                <span class="text-sm font-semibold">Konto</span>
                <select id="expenseAccount" class="form-select" required></select>
              </label>
              <label class="space-y-1 block">
                <span class="text-sm font-semibold">Notiz</span>
                <input id="expenseNote" class="form-input" placeholder="Optional" />
              </label>
              <button class="btn btn-primary w-full" type="submit">Ausgabe speichern</button>
            </form>
          </article>

          <article class="card p-4 space-y-3">
            <h3 class="font-display text-lg font-semibold">+ Einnahme</h3>
            <form id="incomeForm" class="space-y-2">
              <label class="space-y-1 block">
                <span class="text-sm font-semibold">Datum</span>
                <input id="incomeDate" type="date" class="form-input" required />
              </label>
              <label class="space-y-1 block">
                <span class="text-sm font-semibold">Betrag</span>
                <input id="incomeAmount" type="number" step="0.01" inputmode="decimal" class="form-input" required />
              </label>
              <label class="space-y-1 block">
                <span class="text-sm font-semibold">Konto</span>
                <select id="incomeAccount" class="form-select" required></select>
              </label>
              <label class="space-y-1 block">
                <span class="text-sm font-semibold">Kategorie (optional)</span>
                <select id="incomeCategory" class="form-select"></select>
              </label>
              <label class="space-y-1 block">
                <span class="text-sm font-semibold">Notiz</span>
                <input id="incomeNote" class="form-input" placeholder="Optional" />
              </label>
              <button class="btn btn-primary w-full" type="submit">Einnahme speichern</button>
            </form>
          </article>

          <article class="card p-4 space-y-3">
            <h3 class="font-display text-lg font-semibold">+ Transfer</h3>
            <form id="transferForm" class="space-y-2">
              <label class="space-y-1 block">
                <span class="text-sm font-semibold">Datum</span>
                <input id="transferDate" type="date" class="form-input" required />
              </label>
              <label class="space-y-1 block">
                <span class="text-sm font-semibold">Von Konto</span>
                <select id="transferFromAccount" class="form-select" required></select>
              </label>
              <label class="space-y-1 block">
                <span class="text-sm font-semibold">Auf Konto</span>
                <select id="transferToAccount" class="form-select" required></select>
              </label>
              <label class="space-y-1 block">
                <span class="text-sm font-semibold">Betrag</span>
                <input id="transferAmount" type="number" step="0.01" inputmode="decimal" class="form-input" required />
              </label>
              <label class="space-y-1 block">
                <span class="text-sm font-semibold">Notiz</span>
                <input id="transferNote" class="form-input" placeholder="Optional" />
              </label>
              <button class="btn btn-primary w-full" type="submit">Transfer speichern</button>
            </form>
          </article>
        </section>

        <section class="card p-5 space-y-4">
          <header class="flex flex-wrap gap-3 items-end justify-between">
            <div>
              <h3 class="font-display text-lg font-semibold">Buchungsliste</h3>
              <p class="text-sm text-slate-500">Alle Buchungen deines Familienkontos</p>
            </div>
            <div class="flex flex-wrap items-center gap-2">
              <button type="button" id="filterThisWeek" class="btn btn-neutral">Diese Woche</button>
              <button type="button" id="filterThisMonth" class="btn btn-neutral">Dieser Monat</button>
              <label class="text-sm font-semibold" for="transactionsMonthFilter">Monat</label>
              <input id="transactionsMonthFilter" type="month" class="form-input" />
            </div>
          </header>
          <div class="table-wrap">
            <table class="data-table">
              <thead>
                <tr>
                  <th>Datum</th>
                  <th>Typ</th>
                  <th>Betrag</th>
                  <th>Konto</th>
                  <th>Kategorie</th>
                  <th>Notiz</th>
                </tr>
              </thead>
              <tbody id="transactionsTableBody"></tbody>
            </table>
          </div>
        </section>
      </main>
    </div>

    <nav class="lg:hidden fixed bottom-0 inset-x-0 z-40 border-t border-emerald-100 bg-white/95 backdrop-blur">
      <div class="max-w-md mx-auto grid grid-cols-4 px-2 py-2 gap-1">
        <a href="./dashboard.html" class="mobile-link">Start</a>
        <a href="./transactions.html" class="mobile-link active">Buchung</a>
        <a href="./accounts.html" class="mobile-link">Konten</a>
        <a href="./categories.html" class="mobile-link">Kategorien</a>
      </div>
    </nav>

    <script type="module">
      import { initTransactionsPage } from "./js/transactions.js";
      initTransactionsPage();
    </script>
  </body>
</html>
